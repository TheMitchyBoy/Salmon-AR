<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Salmon AR  WebAR demo for Ketchikan Creek">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1c28"/>
      <stop offset="55%" stop-color="#123a4a"/>
      <stop offset="100%" stop-color="#1a5c5a"/>
    </linearGradient>
    <linearGradient id="fish" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8a5c"/>
      <stop offset="100%" stop-color="#e85d3a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <circle cx="1080" cy="60" r="120" fill="#4cd2b0" opacity="0.08"/>
  <circle cx="180" cy="260" r="90" fill="#4cd2b0" opacity="0.06"/>

  <!-- stylized salmon -->
  <g transform="translate(920 155) rotate(-8)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="88" ry="28" fill="url(#fish)"/>
    <path d="M-78 0 L-108 -22 L-108 22 Z" fill="#d94f2e"/>
    <path d="M28 -10 Q52 -28 72 -8 Q52 0 28 10 Z" fill="#ff9a6e" opacity="0.9"/>
    <circle cx="58" cy="-4" r="5" fill="#1a1a1a"/>
  </g>
  <g transform="translate(1020 210) rotate(12)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="62" ry="20" fill="url(#fish)"/>
    <path d="M-55 0 L-78 -16 L-78 16 Z" fill="#d94f2e"/>
  </g>

  <text x="72" y="118" fill="#eaf4f4" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.5">Salmon AR</text>
  <text x="72" y="168" fill="#b9d2d6" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="400">Ketchikan Creek  WebAR image-tracking demo</text>
  <text x="72" y="228" fill="#4cd2b0" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="600" letter-spacing="1.2">A-FRAME · MINDAR · NO APP INSTALL</text>
</svg>
